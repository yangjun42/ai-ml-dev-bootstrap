[project]
name = "ai-ml-starter"
version = "0.1.0"
description = "Starter AI/ML project generated by ai-ml-dev-bootstrap"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = []

[tool.uv]
package = false

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
