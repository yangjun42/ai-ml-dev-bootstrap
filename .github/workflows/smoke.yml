name: smoke
on:
  push:
  pull_request:

jobs:
  shell-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check
        run: |
          bash -n scripts/*.sh
      - name: Python syntax check
        run: |
          python -m py_compile templates/ai-starter/scripts/*.py

  powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PowerShell syntax check
        shell: pwsh
        run: |
          .\tools\test-powershell-syntax.ps1
